<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم Lubot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Background mesh -->
  <div class="mesh"></div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card glass">
      <div class="login-logo">🤖</div>
      <h1 class="login-title">Lubot</h1>
      <p class="login-sub">لوحة تحكم النظام</p>
      <div class="form-group">
        <label>مفتاح الوصول</label>
        <input id="loginKey" type="password" placeholder="أدخل المفتاح السري…" autocomplete="off" />
        <div id="loginError" class="login-error"></div>
      </div>
      <button id="loginBtn" class="btn primary" style="width:100%;margin-top:8px" onclick="doLogin()">دخول</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none;flex-direction:column;min-height:100vh">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand">
        <span class="brand-logo">🤖</span>
        <div>
          <div class="brand-title">Lubot</div>
          <div class="brand-sub">نظام التحكم المتقدم</div>
        </div>
      </div>
      <div class="topbar-right">
        <span id="pillStatus" class="pill">⏳ تحميل…</span>
        <span id="pillGroups" class="pill">— مجموعة</span>
        <span id="pillUptime" class="pill">—</span>
        <span id="pillMem" class="pill">RAM: —</span>
        <button class="btn ghost" onclick="doLogout()">خروج</button>
      </div>
    </div>

    <!-- TAB BAR -->
    <div class="tabs" id="tabBar"></div>

    <!-- CONTENT -->
    <div id="content" class="content-area"></div>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
